name: github pages

on:
  push:
    branches: [ "master" ]
    # Publish semver tags as releases.
    tags: [ 'v*.*.*' ]

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - uses: certseeds/common-actions/actions/checkout@v1
        with:
          fetch-depth: 0

      - uses: certseeds/common-actions/actions/setup-pnpm@v1

      - name: Install Node.js
        uses: certseeds/common-actions/actions/setup-node@v1

      - name: Install dependencies
        run: pnpm install

      - name: pnpm render markdown
        run: pnpm exec node ./scripts/readme.js

      - name: pnpm build fonts
        run: pnpm build

      - name: cp files to dist
        run: |
            rm -rf ./dist/svgs
            cp -r ./dist ./src/public/font

      - name: pnpm build page
        run: pnpm run docs:build

      - name: Upload artifact
        uses: certseeds/common-actions/actions/upload-pages-artifact@v1
        with:
          path: ./.vitepress/dist

  # Deployment job
  deploy:
    # Add a dependency to the build job
    needs: build

    # Grant GITHUB_TOKEN the permissions required to make a Pages deployment
    permissions:
      pages: write      # to deploy to Pages
      id-token: write   # to verify the deployment originates from an appropriate source

    # Deploy to the github-pages environment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    # Specify runner + deployment step
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: certseeds/common-actions/actions/deploy-pages@v1
